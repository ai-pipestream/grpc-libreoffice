[versions]
grpc = "1.69.0"
protobuf = "4.29.3"
protobufPlugin = "0.9.5"
jodconverter = "4.4.9"
log4j = "2.24.3"
junit = "5.11.4"
tomcatAnnotations = "6.0.53"

[libraries]
grpc-netty-shaded = { module = "io.grpc:grpc-netty-shaded", version.ref = "grpc" }
grpc-protobuf = { module = "io.grpc:grpc-protobuf", version.ref = "grpc" }
grpc-stub = { module = "io.grpc:grpc-stub", version.ref = "grpc" }
grpc-services = { module = "io.grpc:grpc-services", version.ref = "grpc" }
grpc-inprocess = { module = "io.grpc:grpc-inprocess", version.ref = "grpc" }
protobuf-java = { module = "com.google.protobuf:protobuf-java", version.ref = "protobuf" }
tomcat-annotations = { module = "org.apache.tomcat:annotations-api", version.ref = "tomcatAnnotations" }
jodconverter-local = { module = "org.jodconverter:jodconverter-local-lo", version.ref = "jodconverter" }
log4j-core = { module = "org.apache.logging.log4j:log4j-core", version.ref = "log4j" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit" }
junit-launcher = { module = "org.junit.platform:junit-platform-launcher" }

[plugins]
protobuf = { id = "com.google.protobuf", version.ref = "protobufPlugin" }
