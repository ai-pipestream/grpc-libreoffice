name: Publish Image

# Builds the image (the build stage runs the full test suite, real LibreOffice
# renders included, so the push is gated on green) and pushes it to
# docker.io/pipestreamai and our Forgejo container registry. Dispatch this
# from Forgejo (git.rokkon.com), where the DOCKER_USER/DOCKER_TOKEN and
# CICD_TOKEN org secrets live; on the GitHub mirror the secrets are absent
# and a stray dispatch fails at login, pushing nothing.
#
# amd64 only for now; LibreOffice exists on arm64 and a matrix build on the
# arm64 runners can follow if a consumer needs it.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (for example 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub (docker.io)
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Log in to Forgejo container registry
        uses: docker/login-action@v3
        with:
          registry: git.rokkon.com
          username: ${{ github.actor }}
          password: ${{ secrets.CICD_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            docker.io/pipestreamai/grpc-libreoffice:${{ inputs.version }}
            docker.io/pipestreamai/grpc-libreoffice:latest
            git.rokkon.com/ai-pipestream/grpc-libreoffice:${{ inputs.version }}
            git.rokkon.com/ai-pipestream/grpc-libreoffice:latest
